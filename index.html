<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }
        #reviews {
            text-align: left;
            width: 60%;
            margin: auto;
        }
        li {
            margin: 5px;
            padding: 5px;
        }
    </style>
</head>

<body>

<h1>📊 Product Sentiment Dashboard</h1>

<button onclick="loadData()">Load Reviews</button>

<h3 id="summary"></h3>

<canvas id="chart" width="400" height="200"></canvas>

<h3>Reviews:</h3>
<ul id="reviews"></ul>

<script>
let chart;

async function loadData() {
    try {
        const res = await fetch("http://127.0.0.1:5000/analyze");
        const data = await res.json();

        let positive = 0, negative = 0, neutral = 0;

        let reviewList = document.getElementById("reviews");
        reviewList.innerHTML = "";

        data.forEach(item => {

            let li = document.createElement("li");
            li.innerHTML = item.review + " → <b>" + item.sentiment + "</b>";
            reviewList.appendChild(li);

            if(item.sentiment === "Positive") positive++;
            else if(item.sentiment === "Negative") negative++;
            else neutral++;
        });

        // Show summary
        document.getElementById("summary").innerHTML =
            "Positive: " + positive + " | Negative: " + negative + " | Neutral: " + neutral;

        drawChart(positive, negative, neutral);

    } catch (error) {
        alert("Error connecting to backend!");
        console.log(error);
    }
}

function drawChart(pos, neg, neu) {
    const ctx = document.getElementById('chart').getContext('2d');

    if (chart) {
        chart.destroy();
    }

    chart = new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ['Positive', 'Negative', 'Neutral'],
            datasets: [{
                data: [pos, neg, neu]
            }]
        }
    });
}
</script>

</body>
</html>
